<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Backtest — NBA Props</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:       #08080f;
    --bg2:      #0d0d1a;
    --bg3:      #111124;
    --border:   #1e1e38;
    --border2:  #2a2a4a;
    --text:     #e8e8f0;
    --muted:    #8888a8;
    --muted2:   #555570;
    --green:    #22c55e;
    --amber:    #f5a623;
    --red:      #f87171;
    --blue:     #60a5fa;
    --indigo:   #818cf8;
    --mono:     'SF Mono', 'Fira Code', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; min-height: 100vh; }

  /* ── Header ── */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.02em; }
  .header-range { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .back-btn { font-size: 11px; font-weight: 600; color: var(--indigo); text-decoration: none; padding: 5px 12px; border: 1px solid var(--border2); border-radius: 4px; }
  .back-btn:hover { background: var(--bg3); }
  .refresh-btn { font-size: 11px; font-weight: 700; color: var(--muted); padding: 5px 12px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: none; }
  .refresh-btn:hover { color: var(--text); border-color: var(--border2); }

  /* ── Layout ── */
  .main { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 10px; margin-bottom: 20px; }
  .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 16px; margin-bottom: 16px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; margin-bottom: 16px; }

  /* ── Metric cards ── */
  .metric { background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 14px 16px; }
  .metric-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 800; font-family: var(--mono); }
  .metric-sub { font-size: 11px; color: var(--muted2); margin-top: 4px; }
  .metric.good .metric-value { color: var(--green); }
  .metric.warn .metric-value { color: var(--amber); }
  .metric.bad  .metric-value { color: var(--red); }
  .metric.blue .metric-value { color: var(--blue); }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 16px 18px; margin-bottom: 16px; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }

  /* ── Bar rows ── */
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
  .bar-label { width: 110px; font-size: 11px; color: var(--muted); text-align: right; flex-shrink: 0; font-family: var(--mono); }
  .bar-track { flex: 1; height: 22px; background: var(--bg3); border-radius: 3px; overflow: hidden; position: relative; border: 1px solid var(--border); }
  .bar-fill { height: 100%; border-radius: 2px; }
  .bar-pct { position: absolute; right: 7px; top: 50%; transform: translateY(-50%); font-size: 11px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .bar-count { width: 60px; font-size: 10px; color: var(--muted2); flex-shrink: 0; font-family: var(--mono); }

  /* ── Chart wrapper ── */
  .chart-wrap { position: relative; width: 100%; }

  /* ── Player table ── */
  .player-table { width: 100%; border-collapse: collapse; }
  .player-table th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted2); padding: 0 8px 8px; text-align: left; border-bottom: 1px solid var(--border); }
  .player-table th:last-child { text-align: right; }
  .player-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); }
  .player-table td:first-child { color: var(--text); }
  .player-table td:last-child { text-align: right; font-family: var(--mono); font-weight: 700; }
  .player-table tr:last-child td { border-bottom: none; }

  /* ── Insight banners ── */
  .insight { background: #0a0a18; border-left: 2px solid var(--indigo); border-radius: 0 4px 4px 0; padding: 9px 12px; margin-bottom: 8px; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .insight strong { color: var(--text); font-weight: 600; }
  .insight.good { border-color: var(--green); }
  .insight.warn { border-color: var(--amber); }
  .insight.bad  { border-color: var(--red); }

  /* ── Badge ── */
  .badge { display: inline-block; font-size: 9px; font-weight: 800; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.05em; vertical-align: middle; margin-left: 4px; }
  .badge-good { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-warn { background: rgba(245,166,35,0.15); color: var(--amber); }
  .badge-bad  { background: rgba(248,113,113,0.15); color: var(--red); }
  .badge-neut { background: rgba(136,136,168,0.12); color: var(--muted); }

  /* ── Loading / error ── */
  .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 13px; }
  .loading-spinner { width: 28px; height: 28px; border: 2px solid var(--border2); border-top-color: var(--indigo); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { color: var(--red); font-size: 12px; text-align: center; padding: 40px; }

  /* ── Section divider ── */
  .section-header { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted2); margin: 24px 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

  .note { font-size: 10px; color: var(--muted2); margin-top: 8px; font-style: italic; }
  .small-sample { color: var(--amber); font-size: 10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <a href="/" class="back-btn">← Slate</a>
    <span class="header-title">Backtest Dashboard</span>
    <span class="header-range" id="dateRange">Loading...</span>
  </div>
  <button class="refresh-btn" onclick="load()">↺ Refresh</button>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="loading-spinner"></div>
    Loading backtest data...
  </div>
</div>

<script>
function barColor(pct) {
  if (pct >= 54) return '#22c55e';
  if (pct >= 50) return '#5DCAA5';
  if (pct >= 47) return '#818cf8';
  if (pct >= 44) return '#555570';
  return '#f87171';
}

function pctBadge(pct, baseline) {
  if (pct == null) return '';
  const diff = pct - baseline;
  if (diff >= 4) return `<span class="badge badge-good">+${diff.toFixed(1)}pp</span>`;
  if (diff <= -4) return `<span class="badge badge-bad">${diff.toFixed(1)}pp</span>`;
  return `<span class="badge badge-neut">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pp</span>`;
}

function sampleWarning(n) {
  if (n < 30) return ` <span class="small-sample">⚠ n=${n}</span>`;
  return '';
}

function buildBarRows(rows, labelKey, baseline) {
  return rows.map(r => {
    const pct = r.hit_rate;
    const label = r[labelKey] || '—';
    return `
      <div class="bar-row">
        <div class="bar-label">${label}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${barColor(pct)}"></div>
          <div class="bar-pct">${pct}%${pctBadge(pct, baseline)}</div>
        </div>
        <div class="bar-count">${r.total.toLocaleString()}${sampleWarning(r.total)}</div>
      </div>`;
  }).join('');
}

async function load() {
  const main = document.getElementById('main');
  main.innerHTML = '<div class="loading"><div class="loading-spinner"></div>Loading...</div>';

  try {
    const [resp, mrResp, clvResp] = await Promise.all([
      fetch('/api/backtest'),
      fetch('/api/morning_report'),
      fetch('/api/clv?days=30'),
    ]);
    if (!resp.ok) throw new Error(await resp.text());
    const d = await resp.json();
    try {
      const mr = await mrResp.json();
      if (mr && mr.grading) d.morning_report = mr;
    } catch(e) {}
    try {
      const clv = await clvResp.json();
      if (clv && clv.summary) d.clv = clv;
    } catch(e) {}
    render(d);
  } catch(e) {
    main.innerHTML = `<div class="error-msg">Error loading data: ${e.message}</div>`;
  }
}

function render(d) {
  const s = d.summary;
  const baseline = s.hit_rate;
  document.getElementById('dateRange').textContent = `${s.date_from} → ${s.date_to}`;

  const dqClean = d.by_dq.find(r => r.parlay_disqualified == 0);
  const dqBad   = d.by_dq.find(r => r.parlay_disqualified == 1);
  const bestEdge = d.by_edge.reduce((a,b) => (b.hit_rate > a.hit_rate ? b : a), d.by_edge[0]);

  // Charts data
  const dateLabels = d.by_date.map(r => r.game_date.slice(5));
  const dateRates  = d.by_date.map(r => r.hit_rate);
  const dateTotals = d.by_date.map(r => r.total);

  const statLabels = d.by_stat.map(r => r.stat);
  const statRates  = d.by_stat.map(r => r.hit_rate);
  const statTotals = d.by_stat.map(r => r.total);

  // Build player tables
  function playerRows(rows, showBadge) {
    return rows.map(r => {
      const cls = r.hit_rate >= 70 ? 'badge-good' : r.hit_rate >= 55 ? 'badge-neut' : 'badge-bad';
      return `<tr>
        <td>${r.player_name}</td>
        <td style="color:var(--muted2)">${r.stat || ''}</td>
        <td style="color:var(--muted2)">${r.total}</td>
        <td><span class="badge ${cls}">${r.hit_rate}%</span></td>
      </tr>`;
    }).join('');
  }

  const main = document.getElementById('main');
  main.innerHTML = `
    <!-- Metric cards -->
    <div class="grid-4">
      <div class="metric blue">
        <div class="metric-label">Graded props</div>
        <div class="metric-value">${s.total.toLocaleString()}</div>
        <div class="metric-sub">${s.days} days · ${s.date_from} to ${s.date_to}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Overall hit rate</div>
        <div class="metric-value" style="color:var(--text)">${s.hit_rate}%</div>
        <div class="metric-sub">${s.hits.toLocaleString()} hits</div>
      </div>
      <div class="metric good">
        <div class="metric-label">Best signal</div>
        <div class="metric-value">${bestEdge.hit_rate}%</div>
        <div class="metric-sub">${bestEdge.bucket}</div>
      </div>
      <div class="metric bad">
        <div class="metric-label">DQ'd hit rate</div>
        <div class="metric-value">${dqBad ? dqBad.hit_rate + '%' : '—'}</div>
        <div class="metric-sub">vs ${dqClean ? dqClean.hit_rate + '% clean' : '—'}${dqBad && dqBad.total < 50 ? ' · small sample' : ''}</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <!-- MODEL VALIDATION — the three numbers that prove or disprove edge   -->
    <!-- ═══════════════════════════════════════════════════════════════════ -->
    <div class="section-title">MODEL VALIDATION</div>

    <!-- 1. Tier calibration -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">1. TIER CALIBRATION — Do the tiers actually rank performance?</div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:10px">
        Target: PRIME ~60-65% · STRONG ~56-60% · SOLID ~52-56% · Tiers should step down cleanly. UNTIERED should be below baseline.
      </div>
      ${d.by_tier_calibration && d.by_tier_calibration.length ? `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">TIER</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">N</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">HIT RATE</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">TARGET</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">AVG EDGE</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">AVG CLV</th>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:5px 0 5px 12px;font-weight:700;letter-spacing:0.08em">STATUS</th>
        </tr></thead>
        <tbody>
          ${d.by_tier_calibration.map(function(r) {
            var targets = {PRIME:[60,65], STRONG:[56,60], SOLID:[52,56]};
            var t = targets[r.tier];
            var status, statusColor;
            if (!t) {
              status = r.hit_rate < baseline ? '✓ Below baseline' : '⚠ Above baseline';
              statusColor = r.hit_rate < baseline ? '#22c55e' : '#f87171';
            } else if (r.hit_rate >= t[0] && r.hit_rate <= t[1]+3) {
              status = '✅ On target';
              statusColor = '#22c55e';
            } else if (r.hit_rate >= t[0]-3) {
              status = '〰 Borderline';
              statusColor = '#fbbf24';
            } else {
              status = '❌ Below target';
              statusColor = '#f87171';
            }
            var hrColor = r.hit_rate >= 58 ? '#22c55e' : r.hit_rate >= 52 ? '#fbbf24' : '#f87171';
            var clvColor = r.avg_clv > 0 ? '#22c55e' : r.avg_clv < 0 ? '#f87171' : 'var(--muted2)';
            var targetStr = t ? t[0]+'-'+t[1]+'%' : '< '+baseline+'%';
            var tierColor = r.tier==='PRIME' ? '#f5a623' : r.tier==='STRONG' ? '#22c55e' : r.tier==='SOLID' ? '#818cf8' : 'var(--muted2)';
            return '<tr>' +
              '<td style="padding:6px 0;font-size:12px;font-weight:800;color:'+tierColor+'">'+r.tier+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">'+r.total+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:14px;font-weight:900;color:'+hrColor+'">'+r.hit_rate+'%</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">'+targetStr+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">'+(r.avg_edge||'—')+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:'+clvColor+'">'+(r.avg_clv!=null?(r.avg_clv>0?'+':'')+r.avg_clv+'%':'—')+'</td>' +
              '<td style="font-size:10px;font-weight:700;color:'+statusColor+';padding-left:12px">'+status+'</td>' +
              '</tr>';
          }).join('')}
        </tbody>
      </table>
      ` : '<div style="color:var(--muted2);font-size:11px;padding:12px 0">Not enough graded data yet. Needs 5+ props per tier.</div>'}
    </div>

    <!-- 2. Veto accuracy -->
    <div class="card" style="margin-bottom:12px">
      <div class="card-title">2. VETO ACCURACY — Do vetoed props actually perform worse?</div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:10px">
        If the veto filters are working, CLEAN props should hit at baseline or better. Every veto category should hit meaningfully below CLEAN.
        If a veto category hits at 55%+, that filter may be too aggressive.
      </div>
      ${d.by_veto && d.by_veto.length ? `
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">VETO TYPE</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">N</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:5px 0;font-weight:700;letter-spacing:0.08em">HIT RATE</th>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:5px 0 5px 12px;font-weight:700;letter-spacing:0.08em">VERDICT</th>
        </tr></thead>
        <tbody>
          ${d.by_veto.map(function(r) {
            var isClean = r.veto_type === 'CLEAN (no veto)';
            var hrColor = isClean
              ? (r.hit_rate >= baseline ? '#22c55e' : '#fbbf24')
              : (r.hit_rate < baseline - 3 ? '#22c55e' : r.hit_rate < baseline ? '#fbbf24' : '#f87171');
            var verdict = isClean
              ? (r.hit_rate >= baseline ? '✅ Baseline holds' : '⚠ Clean props underperforming')
              : (r.hit_rate < baseline - 5 ? '✅ Veto validated — hits below baseline'
                : r.hit_rate < baseline ? '〰 Mildly below baseline'
                : '❌ Veto questionable — hits at or above baseline');
            var verdictColor = verdict.startsWith('✅') ? '#22c55e' : verdict.startsWith('❌') ? '#f87171' : '#fbbf24';
            return '<tr>' +
              '<td style="padding:6px 0;font-size:11px;font-weight:'+(isClean?'800':'400')+';color:'+(isClean?'var(--text)':'var(--muted2)')+'">'+r.veto_type+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">'+r.total+'</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:14px;font-weight:'+(isClean?'900':'700')+';color:'+hrColor+'">'+r.hit_rate+'%</td>' +
              '<td style="font-size:10px;color:'+verdictColor+';padding-left:12px">'+verdict+'</td>' +
              '</tr>';
          }).join('')}
        </tbody>
      </table>
      ` : '<div style="color:var(--muted2);font-size:11px;padding:12px 0">Not enough graded data yet. Needs 10+ props per veto type.</div>'}
    </div>

    <!-- 3. EV per prop -->
    <div class="card" style="margin-bottom:24px">
      <div class="card-title">3. EV ACCURACY — Do higher-EV props actually hit more?</div>
      <div style="font-size:10px;color:var(--muted2);margin-bottom:10px">
        EV = model_prob − 50% (how much above fair we estimate the prop to be). Higher EV buckets should hit at higher rates.
        Flat hit rates across EV buckets = the model's probability estimates aren't calibrated to outcomes.
      </div>
      ${d.by_ev_bucket && d.by_ev_bucket.length ? `
      ${d.by_ev_bucket.map(function(r) {
        var pct = Math.min(r.hit_rate, 75);
        var barColor = r.hit_rate >= baseline + 5 ? '#22c55e' : r.hit_rate >= baseline ? '#818cf8' : '#f87171';
        return '<div class="bar-row">' +
          '<div class="bar-label" style="font-size:10px">' + r.ev_bucket + ' <span style="color:var(--muted2);font-size:9px">(avg +'+r.avg_ev+'%)</span></div>' +
          '<div class="bar-track"><div class="bar-fill" style="width:'+(pct/75*100)+'%;background:'+barColor+'"></div></div>' +
          '<div class="bar-pct" style="color:'+barColor+'">' + r.hit_rate + '%</div>' +
          '<div style="font-size:9px;color:var(--muted2);margin-left:8px">n='+r.total+'</div>' +
          '</div>';
      }).join('')}
      <p class="note">Baseline: ${baseline}% overall hit rate</p>
      ` : '<div style="color:var(--muted2);font-size:11px;padding:12px 0">Not enough graded data yet. Needs model_prob field populated (from new pipeline runs).</div>'}
    </div>

    <!-- Daily chart -->
    <div class="card">
      <div class="card-title">Daily hit rate</div>
      <div class="chart-wrap" style="height:130px"><canvas id="dateChart"></canvas></div>
    </div>

    <!-- Edge + Stat side by side -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Hit rate by edge score</div>
        ${buildBarRows(d.by_edge, 'bucket', baseline)}
        <p class="note">Baseline: ${baseline}%</p>
      </div>
      <div class="card">
        <div class="card-title">Hit rate by stat</div>
        ${buildBarRows(d.by_stat, 'stat', baseline)}
      </div>
    </div>

    <!-- L20 + Gate signals -->
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Hit rate by L20 bucket</div>
        ${buildBarRows(d.by_l20, 'bucket', baseline)}
        <p class="note">L20 is largely flat — only meaningful when combined with cv + dist_profile</p>
      </div>
      <div class="card">
        <div class="card-title">Gate signals</div>
        <div class="bar-row">
          <div class="bar-label">Clean props</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${dqClean ? dqClean.hit_rate : 0}%;background:#818cf8"></div>
            <div class="bar-pct">${dqClean ? dqClean.hit_rate + '%' : '—'}</div>
          </div>
          <div class="bar-count">${dqClean ? dqClean.total.toLocaleString() : '—'}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label">Parlay DQ'd</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${dqBad ? dqBad.hit_rate : 0}%;background:#f87171"></div>
            <div class="bar-pct">${dqBad ? dqBad.hit_rate + '%' : '—'}</div>
          </div>
          <div class="bar-count">${dqBad ? dqBad.total : '—'}${dqBad && dqBad.total < 50 ? '<span class="small-sample"> ⚠</span>' : ''}</div>
        </div>
        ${d.by_signal.map(r => `
        <div class="bar-row">
          <div class="bar-label">${r.signal}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${r.hit_rate}%;background:${barColor(r.hit_rate)}"></div>
            <div class="bar-pct">${r.hit_rate}%</div>
          </div>
          <div class="bar-count">${r.total.toLocaleString()}</div>
        </div>`).join('')}
        ${d.by_cv.length ? `
        <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border)">
          <div class="card-title" style="margin-bottom:10px">dist_cv buckets <span class="small-sample">(new field)</span></div>
          ${buildBarRows(d.by_cv, 'bucket', baseline)}
        </div>` : ''}
      </div>
    </div>

    <!-- Stat chart -->
    <div class="card">
      <div class="card-title">Hit rate by stat — volume view</div>
      <div class="chart-wrap" style="height:${Math.max(200, statLabels.length * 38)}px">
        <canvas id="statChart"></canvas>
      </div>
    </div>

    <!-- Insights -->
    <div class="section-header">Key findings</div>
    <div class="insight bad">
      <strong>BLK props are traps.</strong> ${(d.by_stat.find(r=>r.stat==='BLK')||{}).hit_rate || '~32'}% hit rate across ${(d.by_stat.find(r=>r.stat==='BLK')||{}).total || '800'}+ graded props. Lines are structurally set too high for a low-volume volatile stat. Blocking BLK from parlays is validated.
    </div>
    <div class="insight warn">
      <strong>L20 alone is not predictive.</strong> Hit rates are ${d.by_l20.filter(r=>r.bucket!=='<30%').map(r=>r.hit_rate+'%').join(', ')} across all non-floor L20 buckets. L20 thresholds only work as hard floors to remove clear losers, not as positive selection criteria.
    </div>
    <div class="insight good">
      <strong>Parlay DQ logic works directionally.</strong> ${dqBad ? dqBad.hit_rate + '%' : '?'} vs ${dqClean ? dqClean.hit_rate + '%' : '?'} clean — a real gap. Needs larger sample to confirm statistically (currently ${dqBad ? dqBad.total : '?'} DQ'd props graded).
    </div>
    <div class="insight">
      <strong>Edge score 50–64 underperforms.</strong> The "Strong" band hits at ${(d.by_edge.find(r=>r.bucket==='50-64 Strong')||{}).hit_rate || '?'}%, worse than lower-scored props. Scoring model needs recalibration in this band.
    </div>

    <!-- Players -->
    <div class="section-header">Player hit rates — min 10 graded</div>
    <div class="grid-2">
      <div class="card">
        <div class="card-title">Top performers</div>
        <table class="player-table">
          <thead><tr><th>Player</th><th>Sample</th><th style="text-align:right">Hit rate</th></tr></thead>
          <tbody>${d.by_player.map(r => `<tr>
            <td>${r.player_name}</td>
            <td style="color:var(--muted2);font-family:var(--mono)">${r.total}</td>
            <td><span class="badge ${r.hit_rate>=75?'badge-good':r.hit_rate>=65?'badge-neut':'badge-warn'}">${r.hit_rate}%</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
      <div class="card">
        <div class="card-title">Fade candidates</div>
        <table class="player-table">
          <thead><tr><th>Player</th><th>Sample</th><th style="text-align:right">Hit rate</th></tr></thead>
          <tbody>${d.worst_player.map(r => `<tr>
            <td>${r.player_name}</td>
            <td style="color:var(--muted2);font-family:var(--mono)">${r.total}</td>
            <td><span class="badge ${r.hit_rate<=35?'badge-bad':'badge-warn'}">${r.hit_rate}%</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>

    <!-- Best player+stat combos -->
    <div class="card">
      <div class="card-title">Best player + stat combos — min 8 graded</div>
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 32px">
        <table class="player-table">
          <thead><tr><th>Player</th><th>Stat</th><th>n</th><th style="text-align:right">Hit rate</th></tr></thead>
          <tbody>${d.by_player_stat.slice(0,10).map(r => `<tr>
            <td>${r.player_name}</td>
            <td style="color:var(--indigo);font-family:var(--mono)">${r.stat}</td>
            <td style="color:var(--muted2);font-family:var(--mono)">${r.total}</td>
            <td><span class="badge badge-good">${r.hit_rate}%</span></td>
          </tr>`).join('')}</tbody>
        </table>
        <table class="player-table">
          <thead><tr><th>Player</th><th>Stat</th><th>n</th><th style="text-align:right">Hit rate</th></tr></thead>
          <tbody>${d.by_player_stat.slice(10,20).map(r => `<tr>
            <td>${r.player_name}</td>
            <td style="color:var(--indigo);font-family:var(--mono)">${r.stat}</td>
            <td style="color:var(--muted2);font-family:var(--mono)">${r.total}</td>
            <td><span class="badge badge-good">${r.hit_rate}%</span></td>
          </tr>`).join('')}</tbody>
        </table>
      </div>
    </div>

    ${d.loss_audit && d.loss_audit.total > 0 ? `
    <div class="section-title" style="margin-top:24px">LOSS AUDIT — FAILURE MODE BREAKDOWN</div>
    <div class="grid-2" style="gap:12px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">FAILURE CATEGORIES (last 30 days)</div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">CATEGORY</th>
            <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">COUNT</th>
            <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">%</th>
          </tr></thead>
          <tbody>
            ${Object.entries(d.loss_audit.by_category).sort((a,b)=>b[1]-a[1]).map(([cat,cnt]) => {
              const pct = d.loss_audit.total ? Math.round(cnt/d.loss_audit.total*100) : 0;
              const color = cat === 'GATE_MISS' ? '#f87171' : cat === 'DATA_MISS' ? '#fbbf24' : cat === 'SCORING_ERROR' ? '#f97316' : '#64748b';
              return `<tr>
                <td style="padding:5px 0;font-size:11px;font-weight:700;color:${color}">${cat}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:11px">${cnt}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">${pct}%</td>
              </tr>`;
            }).join('')}
            <tr style="border-top:1px solid #1e1e2e">
              <td style="padding:5px 0;font-size:11px;color:#f87171;font-weight:900">🔧 FIXABLE</td>
              <td style="text-align:right;font-family:var(--mono);font-size:11px;color:#f87171;font-weight:900">${d.loss_audit.fixable}</td>
              <td style="text-align:right;font-family:var(--mono);font-size:11px;color:#f87171">${d.loss_audit.total ? Math.round(d.loss_audit.fixable/d.loss_audit.total*100) : 0}%</td>
            </tr>
          </tbody>
        </table>
        <div style="margin-top:8px;font-size:10px;color:var(--muted2)">
          GATE_MISS + DATA_MISS + SCORING_ERROR = losses that could have been avoided.
          VARIANCE = model correctly flagged risk, loss is acceptable.
        </div>
      </div>
      <div class="card">
        <div class="card-title">RECENT AUDITED LOSSES</div>
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">PLAYER</th>
            <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">STAT</th>
            <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">CATEGORY</th>
          </tr></thead>
          <tbody>
            ${(d.loss_audit.recent || []).slice(0,10).map(r => {
              const color = r.fail_category === 'GATE_MISS' ? '#f87171' : r.fail_category === 'DATA_MISS' ? '#fbbf24' : r.fail_category === 'SCORING_ERROR' ? '#f97316' : '#64748b';
              return `<tr>
                <td style="padding:4px 0;font-size:11px">${r.player_name}</td>
                <td style="font-family:var(--mono);font-size:10px;color:#60a5fa">${r.stat} O${r.line}</td>
                <td style="font-size:10px;font-weight:700;color:${color}" title="${r.fail_reason || ''}">${r.fail_category}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    ` : ''}

    ${d.morning_report && d.morning_report.model_tuning ? `
    <div class="section-title" style="margin-top:24px">MODEL TUNING — SIGNAL CALIBRATION (30 DAYS)</div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">EDGE SCORE BUCKET PERFORMANCE</div>
      <table style="width:100%;border-collapse:collapse">
        <thead><tr>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">BUCKET</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">TOTAL</th>
          <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">HIT RATE</th>
          <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">STATUS</th>
        </tr></thead>
        <tbody>
          ${(d.morning_report.model_tuning.edge_buckets||[]).map(function(b) {
            var color = b.hit_rate >= 55 ? '#22c55e' : b.hit_rate >= 50 ? '#fbbf24' : '#f87171';
            var status = b.hit_rate >= 55 ? '✅ On target' : b.hit_rate >= 50 ? '⚠ Borderline' : '❌ Underperforming';
            return '<tr><td style="padding:5px 0;font-family:var(--mono);font-size:11px;font-weight:700">' + b.bucket + '</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">' + b.total + '</td>' +
              '<td style="text-align:right;font-family:var(--mono);font-size:12px;font-weight:800;color:' + color + '">' + b.hit_rate + '%</td>' +
              '<td style="font-size:10px;color:' + color + '">' + status + '</td></tr>';
          }).join('')}
        </tbody>
      </table>
      ${(d.morning_report.model_tuning.findings||[]).length > 0 ? `
      <div style="margin-top:10px;border-top:1px solid #1e1e2e;padding-top:10px">
        ${(d.morning_report.model_tuning.findings||[]).map(function(f){
          return '<div style="font-size:11px;padding:3px 0;color:var(--muted)">' + f + '</div>';
        }).join('')}
      </div>` : ''}
    </div>
    ` : ''}

    ${d.clv && d.clv.summary && d.clv.summary.total > 0 ? `
    <div class="section-title" style="margin-top:24px">CLV — CLOSING LINE VALUE (30 DAYS)</div>
    <div style="font-size:11px;color:var(--muted2);margin-bottom:12px">
      Positive CLV = model found edge before the market did. The only proof of edge that matters to a professional.
    </div>
    <div class="grid-2" style="gap:12px;margin-bottom:16px">
      <div class="card">
        <div class="card-title">ROLLING CLV SUMMARY</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">
          ${[
            ['AVG CLV', (d.clv.summary.avg_clv > 0 ? '+' : '') + d.clv.summary.avg_clv + '%', d.clv.summary.avg_clv > 0 ? '#22c55e' : '#ef4444'],
            ['BEAT CLOSING', d.clv.summary.beat_pct + '%', d.clv.summary.beat_pct >= 55 ? '#22c55e' : d.clv.summary.beat_pct >= 50 ? '#fbbf24' : '#ef4444'],
            ['BEST CLV', '+' + d.clv.summary.best_clv + '%', '#22c55e'],
            ['WORST CLV', d.clv.summary.worst_clv + '%', '#ef4444'],
          ].map(([label, value, color]) => `
            <div style="background:#0d0d18;border:1px solid #1e1e2e;border-radius:4px;padding:10px;text-align:center">
              <div style="font-size:20px;font-weight:900;color:${color};font-family:var(--mono)">${value}</div>
              <div style="font-size:9px;color:var(--muted2);font-weight:700;letter-spacing:0.06em;margin-top:4px">${label}</div>
            </div>
          `).join('')}
        </div>
        <div style="margin-top:10px;font-size:10px;color:var(--muted2)">
          ${d.clv.summary.total} props with closing line data · 
          ${d.clv.summary.positive_count} beat the closing line
        </div>
      </div>
      <div class="card">
        <div class="card-title">CLV BY TIER</div>
        <table style="width:100%;border-collapse:collapse;margin-top:8px">
          <thead><tr>
            <th style="text-align:left;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">TIER</th>
            <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">N</th>
            <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">AVG CLV</th>
            <th style="text-align:right;font-size:9px;color:var(--muted2);padding:4px 0;font-weight:700;letter-spacing:0.08em">BEAT %</th>
          </tr></thead>
          <tbody>
            ${(d.clv.by_tier || []).map(r => {
              const clvColor = r.avg_clv > 0 ? '#22c55e' : '#ef4444';
              return `<tr>
                <td style="padding:5px 0;font-size:11px;font-weight:700;color:var(--text)">${r.tier}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted2)">${r.total}</td>
                <td style="text-align:right;font-family:var(--mono);font-size:12px;font-weight:800;color:${clvColor}">${r.avg_clv > 0 ? '+' : ''}${r.avg_clv}%</td>
                <td style="text-align:right;font-family:var(--mono);font-size:11px;color:${r.beat_pct >= 55 ? '#22c55e' : '#64748b'}">${r.beat_pct}%</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-title">CLV BY STAT TYPE</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">
        ${(d.clv.by_stat || []).map(r => {
          const clvColor = r.avg_clv > 0 ? '#22c55e' : '#ef4444';
          const bgColor  = r.avg_clv > 0 ? 'rgba(34,197,94,0.08)' : 'rgba(239,68,68,0.08)';
          return `<div style="background:${bgColor};border:1px solid ${clvColor}40;border-radius:4px;padding:8px 12px;text-align:center;min-width:70px">
            <div style="font-size:11px;font-weight:900;color:${clvColor};font-family:var(--mono)">${r.avg_clv > 0 ? '+' : ''}${r.avg_clv}%</div>
            <div style="font-size:9px;font-weight:700;color:var(--text);margin-top:2px">${r.stat}</div>
            <div style="font-size:8px;color:var(--muted2)">${r.beat_pct}% · n=${r.total}</div>
          </div>`;
        }).join('')}
      </div>
    </div>
    ` : `
    <div class="section-title" style="margin-top:24px">CLV — CLOSING LINE VALUE</div>
    <div class="card" style="color:var(--muted2);font-size:12px;padding:20px;text-align:center">
      No CLV data yet. Closing lines are fetched automatically at 6:30pm each day and compared against model probabilities at snapshot time.
      <br><br>
      <a href="/api/clv?refresh=true" style="color:#818cf8;font-size:11px">Trigger manual fetch →</a>
    </div>
    `}

    <p style="font-size:10px;color:var(--muted2);text-align:right;margin-top:8px;padding-bottom:24px">
      ${s.total.toLocaleString()} graded props · ${s.date_from} → ${s.date_to} · refreshes on page load
    </p>
  `;

  // Daily chart
  new Chart(document.getElementById('dateChart'), {
    type: 'bar',
    data: {
      labels: dateLabels,
      datasets: [{
        data: dateRates,
        backgroundColor: dateRates.map(v => v >= 50 ? '#22c55e33' : v >= 47 ? '#818cf833' : '#f8717133'),
        borderColor:     dateRates.map(v => v >= 50 ? '#22c55e' : v >= 47 ? '#818cf8' : '#f87171'),
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (c) => `${c.parsed.y}% · ${dateTotals[c.dataIndex].toLocaleString()} props` }}
      },
      scales: {
        y: { min: 38, max: 56, ticks: { callback: v => v+'%', color: '#555570', font:{size:10} }, grid: { color: '#1e1e38' } },
        x: { ticks: { color: '#555570', font:{size:10}, autoSkip: false }, grid: { display: false } }
      }
    }
  });

  // Stat horizontal bar chart
  const statChartHeight = Math.max(200, statLabels.length * 38);
  new Chart(document.getElementById('statChart'), {
    type: 'bar',
    data: {
      labels: statLabels,
      datasets: [
        {
          label: 'Hit rate %',
          data: statRates,
          backgroundColor: statRates.map(v => v >= 52 ? '#22c55e33' : v >= 48 ? '#818cf833' : '#f8717133'),
          borderColor:     statRates.map(v => v >= 52 ? '#22c55e' : v >= 48 ? '#818cf8' : '#f87171'),
          borderWidth: 1, borderRadius: 3,
        },
        {
          label: 'Props',
          data: statTotals,
          backgroundColor: '#1e1e38',
          borderColor: '#2a2a4a',
          borderWidth: 1, borderRadius: 3,
          yAxisID: 'y2',
        }
      ]
    },
    options: {
      indexAxis: 'y',
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: (c) => c.datasetIndex===0 ? `${c.parsed.x}% hit rate` : `${c.parsed.x.toLocaleString()} props` }}},
      scales: {
        x:  { min: 0, max: 60, ticks: { callback: v => v+'%', color:'#555570', font:{size:10} }, grid: { color:'#1e1e38' } },
        y:  { ticks: { color:'#8888a8', font:{size:11}, font:{family:"'SF Mono','Fira Code',monospace"} }, grid: { display: false } },
        y2: { display: false }
      }
    }
  });
}

load();
</script>
</body>
</html>
